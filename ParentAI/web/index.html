<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TalkWise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Expo Vector Icons fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <style>
    /* Ensure vector icon fonts are not overridden by the Noto Sans wildcard */
    .material-icons,
    [class^="Icon"],
    [class*=" Icon"] {
      font-family: 'Material Icons' !important;
    }

    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    *:not([data-icon]):not(.expo-icon) {
      font-family: 'Noto Sans', 'Noto Sans Arabic', -apple-system,
        BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    /* Remove !important — it was overriding icon fonts */
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
