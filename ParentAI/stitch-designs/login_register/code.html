<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-gutter font-body-sm text-body-sm text-on-background">
<!-- Ambient background element for modern feel -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary-container opacity-[0.03] blur-[100px]"></div>
<div class="absolute top-[60%] -right-[10%] w-[60%] h-[60%] rounded-full bg-secondary-container opacity-[0.03] blur-[120px]"></div>
</div>
<main class="w-full max-w-[420px] z-10 relative">
<!-- Logo Header -->
<div class="text-center mb-xl">
<h1 class="font-h1 text-h1 font-bold text-primary tracking-tight">TalkWise</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-xs">Empowering parenting with AI</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest rounded-[24px] shadow-[0_8px_32px_rgba(99,102,241,0.06)] border border-outline-variant/30 overflow-hidden">
<!-- Tab Toggle -->
<div class="flex p-sm border-b border-surface-variant bg-surface/50">
<button class="flex-1 py-sm font-button text-button text-primary bg-primary/10 rounded-full transition-colors relative z-10">
                    Login
                </button>
<button class="flex-1 py-sm font-button text-button text-on-surface-variant hover:text-on-surface transition-colors relative z-10">
                    Register
                </button>
<!-- Selection indicator for Login -->
<div class="absolute left-sm top-sm bottom-sm w-[calc(50%-12px)] bg-primary-fixed rounded-full -z-0 hidden"></div>
</div>
<div class="p-lg md:p-xl space-y-lg">
<!-- Welcome Text -->
<div>
<h2 class="font-subheading text-subheading text-on-surface">Welcome back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Please enter your details to sign in.</p>
</div>
<!-- Form -->
<form class="space-y-md">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-caption text-caption text-on-surface-variant block ml-1" for="email">Email address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-[#f1f5f9] border-0 rounded-xl py-sm pl-[44px] pr-md text-on-surface font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<label class="font-caption text-caption text-on-surface-variant block ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-[#f1f5f9] border-0 rounded-xl py-sm pl-[44px] pr-md text-on-surface font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between pt-xs">
<label class="flex items-center gap-xs cursor-pointer group">
<input class="rounded-[4px] border-outline-variant text-primary focus:ring-primary w-4 h-4 bg-surface-container-lowest" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-button text-button text-primary hover:text-primary-container transition-colors text-[14px]" href="#">Forgot password?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-gradient text-on-primary font-button text-button py-md rounded-full shadow-[0_4px_14px_rgba(99,102,241,0.25)] hover:brightness-105 transition-all mt-sm flex items-center justify-center gap-xs" type="submit">
                        Sign in
                        <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 mx-md text-outline font-caption text-caption">or continue with</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- Social Action -->
<button class="w-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface font-button text-button py-[14px] rounded-full hover:bg-surface-container transition-colors flex items-center justify-center gap-sm" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
</div>
<!-- Decorative bottom accent -->
<div class="h-1 w-full bg-primary-gradient opacity-80"></div>
</div>
<!-- Footer Links -->
<div class="text-center mt-lg">
<p class="font-caption text-caption text-on-surface-variant">
                By continuing, you agree to our 
                <a class="text-primary hover:underline" href="#">Terms of Service</a> and 
                <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
            </p>
</div>
