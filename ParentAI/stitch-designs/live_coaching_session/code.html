<style>
        /* Base styles */
        body {
            background-color: theme('colors.surface-container-lowest');
            color: theme('colors.on-surface');
        }
        
        /* Hide scrollbar for horizontal scrolling tags */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Pulse animation for recording state */
        @keyframes pulse-ring {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(186, 26, 26, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(186, 26, 26, 0);
            }
        }

        .recording-pulse {
            animation: pulse-ring 2s infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="antialiased min-h-screen flex flex-col relative overflow-hidden bg-background">
<!-- TopAppBar Semantic Shell -->
<header class="sticky top-0 w-full z-40 flex justify-between items-center px-margin py-md bg-surface shadow-sm">
<div class="flex items-center gap-sm">
<button class="flex items-center justify-center p-sm rounded-full hover:bg-surface-container transition-colors text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<h1 class="font-h2 text-h2 text-primary font-bold tracking-tight">Live Coaching</h1>
</div>
<!-- Child Selector Dropdown/Chip -->
<div class="relative">
<button class="flex items-center gap-xs px-md py-sm bg-surface-container rounded-full border border-outline-variant hover:bg-surface-container-high transition-colors">
<div class="w-6 h-6 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center text-[12px] font-bold">
                    S
                </div>
<span class="font-button text-button text-on-surface">Sarah 👶</span>
<span class="material-symbols-outlined text-[20px] text-on-surface-variant">arrow_drop_down</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col pb-xl">
<!-- Session Tags (Horizontal Scroll) -->
<div class="w-full px-margin py-md mt-sm overflow-x-auto no-scrollbar">
<div class="flex items-center gap-sm min-w-max">
<button class="px-md py-sm rounded-full bg-secondary text-on-secondary font-button text-button flex items-center gap-xs shadow-sm transition-transform hover:scale-105">
<span>✨</span> General
                </button>
<button class="px-md py-sm rounded-full bg-surface-container border border-outline-variant text-on-surface-variant hover:bg-surface-container-high font-button text-button flex items-center gap-xs transition-colors">
<span>😴</span> Bedtime
                </button>
<button class="px-md py-sm rounded-full bg-surface-container border border-outline-variant text-on-surface-variant hover:bg-surface-container-high font-button text-button flex items-center gap-xs transition-colors">
<span>📚</span> Homework
                </button>
<button class="px-md py-sm rounded-full bg-surface-container border border-outline-variant text-on-surface-variant hover:bg-surface-container-high font-button text-button flex items-center gap-xs transition-colors">
<span>😤</span> Tantrum
                </button>
<button class="px-md py-sm rounded-full bg-surface-container border border-outline-variant text-on-surface-variant hover:bg-surface-container-high font-button text-button flex items-center gap-xs transition-colors">
<span>📱</span> Screen Time
                </button>
<button class="px-md py-sm rounded-full bg-surface-container border border-outline-variant text-on-surface-variant hover:bg-surface-container-high font-button text-button flex items-center gap-xs transition-colors">
<span>🍽️</span> Mealtime
                </button>
</div>
</div>
<!-- Recording Interface Area -->
<div class="flex-1 flex flex-col items-center justify-center px-margin relative mt-xl">
<!-- Contextual Hint -->
<p class="font-body-lg text-body-lg text-on-surface-variant text-center mb-xl max-w-md">
                Place your device nearby. TalkWise will listen and provide guidance based on the interaction.
            </p>
<!-- Recording Status / Timer -->
<div class="flex items-center gap-sm mb-lg animate-pulse">
<div class="w-3 h-3 rounded-full bg-error"></div>
<span class="font-h2 text-h2 text-on-surface font-semibold tracking-wider">00:32</span>
</div>
<p class="font-body-sm text-body-sm text-outline mb-xl tracking-widest uppercase">Recording Session</p>
<!-- Large Microphone Button -->
<div class="relative flex items-center justify-center mb-xl">
<!-- Ambient Glow / Pulse Rings -->
<div class="absolute w-48 h-48 rounded-full bg-error/10 recording-pulse"></div>
<div class="absolute w-40 h-40 rounded-full bg-error/20 recording-pulse" style="animation-delay: 0.5s;"></div>
<!-- Main Button -->
<button class="relative z-10 w-32 h-32 rounded-full bg-error text-on-error flex items-center justify-center shadow-lg hover:brightness-110 transition-all active:scale-95 border-4 border-error-container">
<span class="material-symbols-outlined text-[64px]" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Audio Visualization Mock (Decorative) -->
<div class="flex items-center justify-center gap-1 h-12 mt-md w-full max-w-xs opacity-70">
<div class="w-1 h-4 bg-outline-variant rounded-full animate-[pulse_1s_ease-in-out_infinite]"></div>
<div class="w-1 h-8 bg-error/60 rounded-full animate-[pulse_1.2s_ease-in-out_infinite_0.1s]"></div>
<div class="w-1 h-12 bg-error rounded-full animate-[pulse_0.8s_ease-in-out_infinite_0.2s]"></div>
<div class="w-1 h-6 bg-error/80 rounded-full animate-[pulse_1.5s_ease-in-out_infinite_0.3s]"></div>
<div class="w-1 h-10 bg-error/70 rounded-full animate-[pulse_1.1s_ease-in-out_infinite_0.4s]"></div>
<div class="w-1 h-5 bg-outline-variant rounded-full animate-[pulse_0.9s_ease-in-out_infinite_0.5s]"></div>
<div class="w-1 h-8 bg-error/50 rounded-full animate-[pulse_1.3s_ease-in-out_infinite_0.6s]"></div>
<div class="w-1 h-3 bg-outline-variant rounded-full animate-[pulse_1.4s_ease-in-out_infinite_0.7s]"></div>
</div>
</div>
<!-- Action Area (Bottom) -->
<div class="mt-auto px-margin pt-xl pb-lg w-full flex justify-center">
<button class="w-full max-w-sm py-md px-lg rounded-full bg-surface-container-high border border-outline-variant text-error font-button text-button shadow-sm hover:bg-surface-variant transition-colors flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[24px]">stop_circle</span>
                Stop Session
            </button>
</div>
</main>
<!-- Navigation Shell suppressed due to task-focused/transactional screen intent (Recording Session) -->
</body></html>
