<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Child Profile - TalkWise</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#ffb783",
                        "primary-fixed-dim": "#c0c1ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e9e6f3",
                        "on-background": "#1b1b23",
                        "primary-fixed": "#e1e0ff",
                        "secondary-container": "#8455ef",

                        "tertiary-container": "#b55d00",
                        "outline-variant": "#c7c4d7",
                        "inverse-surface": "#303038",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#d0bcff",
                        "on-tertiary-fixed-variant": "#703700",
                        "inverse-primary": "#c0c1ff",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "surface-container-low": "#f5f2fe",
                        "outline": "#767586",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#301400",
                        "on-primary-fixed": "#07006c",
                        "surface-container": "#efecf8",
                        "on-tertiary-container": "#fffbff",
                        "on-secondary-container": "#fffbff",
                        "secondary": "#6b38d4",
                        "on-primary-container": "#fffbff",
                        "surface": "#fcf8ff",
                        "on-secondary-fixed-variant": "#5516be",
                        "on-surface-variant": "#464554",
                        "primary-container": "#6063ee",
                        "surface-container-highest": "#e4e1ed",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#23005c",
                        "surface-bright": "#fcf8ff",
                        "surface-variant": "#e4e1ed",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "primary": "#4648d4",
                        "surface-tint": "#494bd6",
                        "surface-dim": "#dbd8e4",
                        "inverse-on-surface": "#f2effb",
                        "secondary-fixed": "#e9ddff",
                        "on-surface": "#1b1b23",
                        "tertiary": "#904900",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffdcc5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "margin": "24px",
                        "md": "16px",
                        "gutter": "16px",
                        "sm": "12px",

                        "xl": "32px",
                        "xs": "8px"
                    },
                    "fontFamily": {
                        "subheading": ["Plus Jakarta Sans"],
                        "body-sm": ["Inter"],
                        "h2": ["Plus Jakarta Sans"],
                        "button": ["Plus Jakarta Sans"],
                        "caption": ["Inter"],
                        "body-lg": ["Inter"],
                        "h1": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "subheading": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],

                        "body-lg": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }]

                }
            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col font-body-lg">
<!-- Task-Focused Header (Navigation Shell Suppressed) -->
<header class="sticky top-0 w-full z-40 bg-surface-container-lowest flex items-center px-margin py-md border-b border-surface-variant">
<button aria-label="Go back" class="mr-md text-on-surface hover:text-primary transition-colors flex items-center justify-center p-xs rounded-full hover:bg-surface-container-low">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<h1 class="font-subheading text-subheading text-on-surface flex-1">Add Child Profile</h1>
</header>
<main class="flex-1 w-full max-w-2xl mx-auto px-margin py-xl flex flex-col gap-xl pb-[120px]">
<!-- Avatar Upload Section -->
<section class="flex flex-col items-center justify-center pt-md">
<div class="relative group cursor-pointer">
<div class="w-32 h-32 rounded-full bg-surface-container border-2 border-dashed border-outline-variant flex items-center justify-center overflow-hidden transition-all group-hover:border-primary group-hover:bg-surface-container-low">
<span class="material-symbols-outlined text-outline-variant text-4xl group-hover:text-primary transition-colors" data-weight="fill" style="font-variation-settings: 'FILL' 1; font-size: 40px;">photo_camera</span>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-on-primary rounded-full p-sm shadow-md border-2 border-surface-container-lowest">
<span class="material-symbols-outlined text-sm" style="font-size: 16px;">add</span>
</div>
</div>
<p class="mt-sm font-body-sm text-body-sm text-on-surface-variant">Upload a photo</p>
</section>
<!-- Form Fields -->
<form class="flex flex-col gap-lg">
<!-- Child's Name -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="child-name">Child's Name <span class="text-error">*</span></label>
<input class="w-full bg-surface-container-low border border-surface-variant rounded-lg px-md py-sm font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder-outline" id="child-name" placeholder="Enter full name" required="" type="text"/>
</div>
<!-- Age -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="child-age">Age <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-low border border-surface-variant rounded-lg px-md py-sm pr-xl font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="child-age" required="">
<option disabled="" selected="" value="">Select age</option>
<option value="0-1">Under 1 year</option>
<option value="1-2">1 - 2 years</option>
<option value="3-5">3 - 5 years</option>
<option value="6-8">6 - 8 years</option>
<option value="9-12">9 - 12 years</option>
<option value="13+">13+ years</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-md text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Physical Description -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="child-desc">Physical Description</label>
<textarea class="w-full bg-surface-container-low border border-surface-variant rounded-lg px-md py-sm font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder-outline resize-y" id="child-desc" placeholder="Height, hair color, eye color, identifying marks..." rows="3"></textarea>
</div>
<!-- School Name -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="school-name">School Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant">school</span>
</div>
<input class="w-full bg-surface-container-low border border-surface-variant rounded-lg pl-[44px] pr-md py-sm font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder-outline" id="school-name" placeholder="Current school or daycare" type="text"/>
</div>
</div>
<!-- Emergency Contact -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="emergency-contact">Emergency Contact</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant">call</span>
</div>
<input class="w-full bg-surface-container-low border border-surface-variant rounded-lg pl-[44px] pr-md py-sm font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder-outline" id="emergency-contact" placeholder="Name and phone number" type="tel"/>
</div>
</div>
<!-- Medical Notes -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="medical-notes">Medical Notes</label>
<textarea class="w-full bg-surface-container-low border border-surface-variant rounded-lg px-md py-sm font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder-outline resize-y" id="medical-notes" placeholder="Allergies, medications, or specific health conditions..." rows="3"></textarea>
</div>
</form>
</main>
<!-- Fixed Action Bar at Bottom -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest/90 backdrop-blur-md border-t border-surface-variant p-margin z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full py-md px-lg rounded-full bg-gradient-to-br from-primary to-secondary text-on-primary font-button text-button shadow-[0_4px_14px_rgba(99,102,241,0.3)] hover:brightness-105 active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" style="font-size: 20px;">save</span>
                Save Profile
            </button>
</div>
</div>
</body></html>
